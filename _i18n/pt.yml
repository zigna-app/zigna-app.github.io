# Features Section
features:
  title: "Por que escolher Zigna.app?"
  subtitle: "Sua plataforma completa de educação e monitoramento de trading impulsionada por IA"
  discipline:
    title: "🧠 Opere com a disciplina que falta ao cérebro humano."
    text: "Pare de ser vítima dos seus próprios impulsos e comece a executar com precisão digital."
  signal:
    title: "📡 Silencie o Ruído. Enxergue o Sinal."
    text: "Pense como um Gestor de Portfólio. Zigna filtra o caos dos dados de varejo através de uma lente macro profissional, te dando a clareza para agir enquanto os outros entram em pânico."
  execution:
    title: "⚙️ Execução não é Sorte. É Método."
    text: "Vencer é um processo; a maestria é o resultado. A Zigna reprograma seus hábitos, transformando palpites incertos em um fluxo de trabalho profissional e repetível."
  intelligence:
    title: "📊 Inteligência de Mercado em Tempo Real"
    text: "Fique à frente com dados de mercado ao vivo, indicadores técnicos e insights impulsionados por IA. Acompanhe vários portfólios, defina alarmes de preço e receba notificações instantâneas quando surgirem oportunidades."
  alerts:
    title: "🔔 Alertas e Notificações Inteligentes"
    text: "Nunca perca uma oportunidade de trading. Defina alertas de preço personalizados, receba notificações de notícias que movimentam o mercado e receba insights gerados por IA adaptados ao seu portfólio."
  multiasset:
    title: "👥 Suporte Multi-Ativos"
    text: "Opere ações, criptomoedas, forex, commodities e muito mais — tudo em uma plataforma unificada. Seu tutor de IA se adapta a cada classe de ativo com conhecimento especializado."

