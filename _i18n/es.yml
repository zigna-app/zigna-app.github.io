# Features Section
features:
  title: "¿Por qué elegir Zigna.app?"
  subtitle: "Tu plataforma completa de educación y monitoreo de trading impulsada por IA"
  discipline:
    title: "🧠 Opera con la disciplina que le falta al cerebro humano."
    text: "Deja de ser víctima de tus propios impulsos y empieza a ejecutar con precisión digital."
  signal:
    title: "📡 Silencia el Ruido. Mira la Señal."
    text: "Piensa como un Gestor de Portafolios. Zigna filtra el caos de los datos minoristas a través de una lente macro profesional, dándote la claridad para actuar cuando otros entran en pánico."
  execution:
    title: "⚙️ Operar no es un Juego de Azar."
    text: "Ganar es un proceso; la maestría es el resultado. Zigna reprograma tus hábitos, transformando dudas constantes en un flujo de trabajo profesional y repetible."
  intelligence:
    title: "📊 Inteligencia de Mercado en Tiempo Real"
    text: "Mantente a la vanguardia con datos de mercado en vivo, indicadores técnicos e información impulsada por IA. Rastrea múltiples portafolios, establece alarmas de precios y recibe notificaciones instantáneas cuando surjan oportunidades."
  alerts:
    title: "🔔 Alertas y Notificaciones Inteligentes"
    text: "Nunca pierdas una oportunidad de trading. Establece alertas de precios personalizadas, recibe notificaciones de noticias que mueven el mercado y obtén información generada por IA adaptada a tu portafolio."
  multiasset:
    title: "👥 Soporte Multiactivo"
    text: "Opera acciones, criptomonedas, forex, materias primas y más, todo desde una plataforma unificada. Tu tutor de IA se adapta a cada clase de activo con conocimiento especializado."

